<!DOCTYPE html>
<html>
<head>
    <title>Hype Fitness AI Coach</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; }
        .header { background: #E87722; color: white; padding: 20px; text-align: center; }
        .box { max-width: 700px; margin: 20px auto; background: white; border-radius: 10px; padding: 20px; }
        #messages { height: 400px; overflow-y: auto; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .coach-msg { background: #FFF3E0; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .user-msg { background: #E87722; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: right; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { padding: 12px 24px; background: #E87722; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
<div class="header">
    <h1>Hype Fitness AI Coach</h1>
    <p>Start small. Stay consistent. I'm here 24/7.</p>
</div>
<div class="box">
    <div id="messages">
        <div class="coach-msg">Hey! I'm your Hype Fitness AI coach. What can I help you with today?</div>
    </div>
    <div class="input-row">
        <input type="text" id="msg" placeholder="Ask your coach anything...">
        <button id="btn">Send</button>
    </div>
</div>
<script>
document.getElementById('btn').addEventListener('click', send);
document.getElementById('msg').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') send();
});

async function send() {
    var msg = document.getElementById('msg').value;
    if(!msg) return;
    
    var messages = document.getElementById('messages');
    messages.innerHTML += '<div class="user-msg">' + msg + '</div>';
    document.getElementById('msg').value = '';
    messages.innerHTML += '<div class="coach-msg">Thinking...</div>';
    
    try {
        var r = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });
        var data = await r.json();
        var msgs = messages.getElementsByClassName('coach-msg');
        msgs[msgs.length-1].innerHTML = data.response;
    } catch(e) {
        var msgs = messages.getElementsByClassName('coach-msg');
        msgs[msgs.length-1].innerHTML = 'Connection error. Make sure Flask is running!';
    }
    messages.scrollTop = messages.scrollHeight;
}
</script>
</body>
</html>
